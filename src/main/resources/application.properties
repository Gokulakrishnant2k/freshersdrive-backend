# ============================================
# FreshersDrive - Application Configuration
# Safe to commit — contains no secrets.
# Real values live in application-local.properties (gitignored).
# ============================================

spring.application.name=freshersdrive
spring.profiles.active=local

# --- Server ---
server.port=8080
server.servlet.context-path=/api

# --- MySQL Database (driver only here; url/username/password in local profile) ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Jackson (REQUIRED for LocalDate serialization) ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# --- JWT (expiry settings only; secret key lives in local profile) ---
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# --- Mail (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from-name=FreshersDrive

# --- CORS ---
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# --- File Upload ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/resumes

# --- Async (non-blocking email sending via @Async) ---
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# --- Scheduling (daily reminder cron job via @Scheduled) ---
spring.task.scheduling.pool.size=2

# --- Logging ---
logging.level.com.freshersdrive=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.mail=DEBUG

# ============================================
# Google OAuth2 (client-id/secret in local profile)
# ============================================
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/login/oauth2/code/google

# OAuth2 success redirect
app.oauth2.redirect-uri=http://localhost:5173/oauth2/success

# --- Password Reset ---
app.password-reset.expiry-minutes=15
app.base-url=http://localhost:5173