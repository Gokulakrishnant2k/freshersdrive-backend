# ============================================
# FreshersDrive - Application Configuration
# Safe to commit — contains no secrets.
# Real values live in environment variables on Render.
# ============================================

spring.application.name=freshersdrive

# --- Server ---
server.port=${PORT:8080}
server.servlet.context-path=/api

# --- MySQL Database ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- HikariCP Connection Pool ---
# Kept small/conservative to stay under Aiven's free-tier MySQL connection limit.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Jackson (REQUIRED for LocalDate serialization) ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# --- JWT ---
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# --- Mail (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from-name=FreshersDrive

# --- CORS ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# --- File Upload ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/resumes

# --- Async ---
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# --- Scheduling ---
spring.task.scheduling.pool.size=2

# --- Logging ---
logging.level.com.freshersdrive=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.mail=DEBUG

# --- TEMP: Expose full error details for debugging the 500 on /admin/drives/pending ---
# REMOVE these two lines once the bug is found and fixed — they leak stack traces publicly.
server.error.include-message=always
server.error.include-stacktrace=always

# ============================================
# Google OAuth2
# ============================================
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BACKEND_URL:http://localhost:8080}/api/login/oauth2/code/google

# OAuth2 success redirect
app.oauth2.redirect-uri=${APP_FRONTEND_URL:http://localhost:5173}/oauth2/success

# --- Password Reset ---
app.password-reset.expiry-minutes=15
app.base-url=${APP_FRONTEND_URL:http://localhost:5173}
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

app.mail.from=${SPRING_MAIL_USERNAME:}